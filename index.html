<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ FC 와디즈 팀 밸런서</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --bg-card-hover: #242952;
            --accent-primary: #00ff88;
            --accent-secondary: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border-color: #2d3548;
            --black-team: #2d3436;
            --white-team: #f5f5f5;
            --warning: #ffd93d;
            --danger: #ff6b6b;
            --success: #51cf66;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 212, 255, 0.1));
            border-radius: 20px;
            margin-bottom: 40px;
            border: 2px solid var(--border-color);
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Section Titles */
        .section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--accent-primary);
            display: inline-block;
        }

        /* Player Selection Controls */
        .selection-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-primary);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-dark);
            font-weight: 700;
            border: none;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-upload {
            background: var(--bg-card);
            border: 2px dashed var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .btn-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Player Grid */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .player-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .player-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
        }

        .player-card.unselected {
            opacity: 0.4;
            filter: grayscale(0.8);
        }

        .player-card.locked-black {
            border-color: #2d3436;
            background: linear-gradient(135deg, rgba(45, 52, 54, 0.3), var(--bg-card));
        }

        .player-card.locked-white {
            border-color: #f5f5f5;
            background: linear-gradient(135deg, rgba(245, 245, 245, 0.1), var(--bg-card));
        }

        .player-checkbox {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .player-header {
            margin-bottom: 15px;
        }

        .player-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .player-type {
            color: var(--accent-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .player-total {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-primary);
            text-align: center;
            margin: 15px 0;
        }

        .player-stats-mini {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .stat-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            width: 60px;
        }

        .stat-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .stat-value {
            font-size: 0.75rem;
            font-weight: 700;
            width: 30px;
            text-align: right;
        }

        .team-toggle {
            display: flex;
            gap: 5px;
            margin-top: 15px;
        }

        .team-toggle-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-dark);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .team-toggle-btn.active-none {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .team-toggle-btn.active-black {
            border-color: #2d3436;
            background: #2d3436;
            color: white;
        }

        .team-toggle-btn.active-white {
            border-color: #f5f5f5;
            background: #f5f5f5;
            color: #2d3436;
        }

        /* Team Size Selector */
        .team-size-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .size-btn {
            padding: 15px 30px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .size-btn:hover:not(:disabled) {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .size-btn.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-dark);
            border: none;
        }

        .size-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .warning-message {
            padding: 15px;
            background: rgba(255, 217, 61, 0.1);
            border: 2px solid var(--warning);
            border-radius: 10px;
            color: var(--warning);
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* Balance Button */
        .balance-button-container {
            text-align: center;
            margin: 40px 0;
        }

        .btn-balance {
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-dark);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .btn-balance:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.5);
        }

        .btn-balance:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Results Section */
        .results-container {
            display: none;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-cards {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .result-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            border-color: var(--accent-primary);
            transform: scale(1.02);
        }

        .result-card.selected {
            border-color: var(--accent-primary);
            border-width: 4px;
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.4);
        }

        .rank-badge {
            position: absolute;
            top: -15px;
            left: 30px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-dark);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
        }

        .teams-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .team-column {
            padding: 20px;
            border-radius: 15px;
        }

        .team-column.black-team {
            background: linear-gradient(135deg, rgba(45, 52, 54, 0.3), rgba(45, 52, 54, 0.1));
            border: 2px solid #2d3436;
        }

        .team-column.white-team {
            background: linear-gradient(135deg, rgba(245, 245, 245, 0.1), rgba(245, 245, 245, 0.05));
            border: 2px solid #f5f5f5;
        }

        .team-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            text-align: center;
        }

        .team-players {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .team-player {
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-player-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .team-player-type {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .balance-comparison {
            margin-bottom: 30px;
        }

        .comparison-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .comparison-bars {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .comparison-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .comparison-label {
            width: 100px;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
        }

        .comparison-bar-container {
            flex: 1;
            display: flex;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .comparison-bar-black {
            background: linear-gradient(90deg, #2d3436, #636e72);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .comparison-bar-white {
            background: linear-gradient(90deg, #dfe6e9, #f5f5f5);
            color: #2d3436;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .balance-score {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-percentage {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .balance-grade {
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 10px;
        }

        .btn-select-combo {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-dark);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-select-combo:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        /* Final Decision Display */
        .final-decision {
            display: none;
            text-align: center;
            padding: 50px;
            background: var(--bg-card);
            border: 4px solid var(--accent-primary);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }

        .final-decision.show {
            display: block;
            animation: celebration 0.8s ease;
        }

        @keyframes celebration {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .final-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-vs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 40px;
            align-items: center;
            margin-bottom: 40px;
        }

        .final-team {
            padding: 30px;
            border-radius: 20px;
        }

        .final-team.black {
            background: linear-gradient(135deg, #2d3436, #1a1f3a);
            border: 3px solid #2d3436;
        }

        .final-team.white {
            background: linear-gradient(135deg, rgba(245, 245, 245, 0.15), rgba(245, 245, 245, 0.05));
            border: 3px solid #f5f5f5;
        }

        .final-team-title {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .final-team-players {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .final-player {
            font-size: 1.3rem;
            font-weight: 700;
            padding: 10px;
            background: var(--bg-dark);
            border-radius: 10px;
        }

        .vs-divider {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent-primary);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent-primary);
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--accent-primary);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 2rem;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--accent-primary);
            transform: rotate(90deg);
        }

        .detailed-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detailed-stat {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 10px;
        }

        .detailed-stat-label {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .detailed-stat-value {
            font-weight: 700;
            color: var(--accent-primary);
        }

        /* Radar Chart */
        .radar-chart {
            margin: 30px 0;
            display: flex;
            justify-content: center;
        }

        .radar-svg {
            width: 100%;
            max-width: 400px;
            height: 400px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .player-grid {
                grid-template-columns: 1fr;
            }

            .teams-display {
                grid-template-columns: 1fr;
            }

            .final-vs {
                grid-template-columns: 1fr;
            }

            .vs-divider {
                transform: rotate(90deg);
                font-size: 3rem;
            }

            .detailed-stats {
                grid-template-columns: 1fr;
            }

            .size-btn {
                flex: 1;
                min-width: 100px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>⚽ FC 와디즈 팀 밸런서</h1>
            <p class="subtitle">균형잡힌 팀을 자동으로 구성합니다</p>
        </header>

        <!-- Player Selection Section -->
        <section class="section">
            <h2 class="section-title">선수 선택</h2>

            <div class="selection-controls">
                <button class="btn" onclick="selectAllPlayers()">전체 선택</button>
                <button class="btn" onclick="deselectAllPlayers()">전체 해제</button>
                <button class="btn btn-upload">
                    📁 엑셀 업로드
                    <input type="file" accept=".xlsx,.xls" onchange="handleFileUpload(event)">
                </button>
            </div>

            <div class="player-grid" id="playerGrid"></div>
        </section>

        <!-- Team Size Selector -->
        <section class="section">
            <h2 class="section-title">팀 구성</h2>

            <div id="warningMessage" class="warning-message hidden"></div>

            <div class="team-size-selector">
                <button class="size-btn" data-size="3" onclick="selectTeamSize(3)">3 vs 3</button>
                <button class="size-btn" data-size="4" onclick="selectTeamSize(4)">4 vs 4</button>
                <button class="size-btn" data-size="5" onclick="selectTeamSize(5)">5 vs 5</button>
                <button class="size-btn" data-size="6" onclick="selectTeamSize(6)">6 vs 6</button>
            </div>

            <div class="balance-button-container">
                <button class="btn-balance" id="balanceBtn" onclick="balanceTeams()" disabled>
                    팀 나누기
                </button>
            </div>
        </section>

        <!-- Results Section -->
        <section class="section results-container" id="resultsContainer">
            <h2 class="section-title">추천 조합</h2>
            <div class="result-cards" id="resultCards"></div>
        </section>

        <!-- Final Decision -->
        <div class="final-decision" id="finalDecision">
            <div class="final-title">🎉 팀 구성 완료! 🎉</div>
            <div class="final-vs" id="finalVsDisplay"></div>
            <button class="btn-balance" onclick="resetBalance()">다시 뽑기</button>
        </div>

        <!-- Modal for detailed stats -->
        <div class="modal" id="statsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title" id="modalPlayerName"></h3>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="radar-chart">
                    <svg class="radar-svg" id="radarChart" viewBox="0 0 400 400"></svg>
                </div>
                <div class="detailed-stats" id="detailedStats"></div>
            </div>
        </div>
    </div>

    <script>
        // 선수 데이터
        let PLAYERS = [
            {
                name: '박경원',
                type: '줄라탄',
                stats: {
                    speed: 10, acceleration: 8, stamina: 12,
                    shotPower: 14, shotAccuracy: 9, finishing: 12,
                    passing: 10, defense: 8, physical: 15,
                    positioning: 13, mentality: 14, aggression: 10
                }
            },
            {
                name: '강주석',
                type: '헐크',
                stats: {
                    speed: 8, acceleration: 8, stamina: 10,
                    shotPower: 10, shotAccuracy: 10, finishing: 10,
                    passing: 10, defense: 12, physical: 18,
                    positioning: 8, mentality: 10, aggression: 10
                }
            },
            {
                name: '조수빈',
                type: '스테판커리',
                stats: {
                    speed: 14, acceleration: 13, stamina: 16,
                    shotPower: 12, shotAccuracy: 12, finishing: 11,
                    passing: 11, defense: 8, physical: 8,
                    positioning: 12, mentality: 12, aggression: 10
                }
            },
            {
                name: '조광진',
                type: '루니',
                stats: {
                    speed: 11, acceleration: 10, stamina: 17,
                    shotPower: 12, shotAccuracy: 10, finishing: 10,

        // 선수 상태 (선택 여부, 팀 고정)
        const playerStates = {};

        // 초기화
        function init() {
            // localStorage에서 상태 복원
            const savedStates = localStorage.getItem('playerStates');
            if (savedStates) {
                Object.assign(playerStates, JSON.parse(savedStates));
            } else {
                // 기본값: 모든 선수 선택됨
                PLAYERS.forEach(player => {
                    playerStates[player.name] = {
                        selected: true,
                        locked: 'none' // 'none', 'black', 'white'
                    };
                });
            }

            renderPlayerGrid();
            updateTeamSizeButtons();
        }

        // 카테고리별 점수 계산
        function calculateCategories(player) {
            const s = player.stats;
            return {
                attack: s.shotPower + s.shotAccuracy + s.finishing,
                midfield: s.passing + s.positioning,
                defense: s.defense + s.physical,
                physical: s.stamina + s.speed + s.acceleration,
                mental: s.mentality + s.aggression
            };
        }

        // 총합 계산
        function calculateTotal(player) {
            const stats = player.stats;
            return Object.values(stats).reduce((a, b) => a + b, 0);
        }

        // 선수 그리드 렌더링
        function renderPlayerGrid() {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = '';

                const state = playerStates[player.name];
                const categories = calculateCategories(player);
                const total = calculateTotal(player);
                const maxCategory = Math.max(...Object.values(categories));

                const card = document.createElement('div');
                card.className = `player-card ${!state.selected ? 'unselected' : ''} ${state.locked !== 'none' ? 'locked-' + state.locked : ''}`;

                card.innerHTML = `
                    <input type="checkbox" class="player-checkbox"

                           onchange="togglePlayerSelection('${player.name}')">

                    <div class="player-header" onclick="showPlayerDetails('${player.name}')">

                        <div class="player-type">${player.type}</div>
                    </div>

                    <div class="player-total" style="display:none">${total}</div>

                    <div class="player-stats-mini">

                            const labels = {

                                defense: '수비력',
                                physical: '피지컬',

                            return `
                                <div class="stat-bar">
                                    <span class="stat-label">${labels[key]}</span>
                                    <div class="stat-bar-bg">
                                        <div class="stat-bar-fill" style="width: ${percentage}%"></div>
                                    </div>
                                    <span class="stat-value" style="display:none">${value}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <div class="team-toggle">

                        <button class="team-toggle-btn ${state.locked === 'white' ? 'active-white' : ''}"

                grid.appendChild(card);

        // 선수 선택 토글
        function togglePlayerSelection(name) {
            playerStates[name].selected = !playerStates[name].selected;
            renderPlayerGrid();

        // 팀 크기 버튼 업데이트
        function updateTeamSizeButtons() {
            const selectedPlayers = PLAYERS.filter(p => playerStates[p.name].selected);
            const count = selectedPlayers.length;
            const warningMsg = document.getElementById('warningMessage');
            const balanceBtn = document.getElementById('balanceBtn');

            document.querySelectorAll('.size-btn').forEach(btn => {
                const size = parseInt(btn.dataset.size);
                const required = size * 2;

                if (count >= required) {
                    btn.disabled = false;
                } else {
                    btn.disabled = true;
                    if (btn.classList.contains('active')) {
                        btn.classList.remove('active');
                        selectedTeamSize = null;
                    }
                }
            });

            // 경고 메시지
            if (count < 6) {
                warningMsg.textContent = `⚠️ 최소 6명의 선수가 필요합니다 (현재 ${count}명 선택됨)`;
                warningMsg.classList.remove('hidden');
                balanceBtn.disabled = true;
            } else if (!selectedTeamSize) {
                warningMsg.textContent = '팀 구성을 선택해주세요';
                warningMsg.classList.remove('hidden');
                balanceBtn.disabled = true;
            } else {
                const lockedBlack = selectedPlayers.filter(p => playerStates[p.name].locked === 'black').length;
                const lockedWhite = selectedPlayers.filter(p => playerStates[p.name].locked === 'white').length;

                if (lockedBlack > selectedTeamSize || lockedWhite > selectedTeamSize) {
                    warningMsg.textContent = `⚠️ 고정된 선수가 너무 많습니다 (흑팀: ${lockedBlack}, 백팀: ${lockedWhite}, 팀 크기: ${selectedTeamSize})`;
                    warningMsg.classList.remove('hidden');
                    balanceBtn.disabled = true;
                } else {
                    warningMsg.classList.add('hidden');
                    balanceBtn.disabled = false;
                }
            }
        }

        // 팀 크기 선택
        function selectTeamSize(size) {
            selectedTeamSize = size;
            document.querySelectorAll('.size-btn').forEach(btn => {
                if (parseInt(btn.dataset.size) === size) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            updateTeamSizeButtons();
        }

        // 조합 생성 (JavaScript equivalent of itertools.combinations)
        function* combinations(array, size) {
            if (size === 0) {
                yield [];
                return;
            }
            if (size > array.length) return;

            for (let i = 0; i <= array.length - size; i++) {
                const head = array[i];
                const tail = array.slice(i + 1);
                for (const combo of combinations(tail, size - 1)) {
                    yield [head, ...combo];
                }
            }
        }

        // 팀 밸런싱
        function balanceTeams() {
            const selectedPlayers = PLAYERS.filter(p => playerStates[p.name].selected);
            const lockedBlack = selectedPlayers.filter(p => playerStates[p.name].locked === 'black');
            const lockedWhite = selectedPlayers.filter(p => playerStates[p.name].locked === 'white');
            const unlockedPlayers = selectedPlayers.filter(p => playerStates[p.name].locked === 'none');

            const blackNeeded = selectedTeamSize - lockedBlack.length;
            const whiteNeeded = selectedTeamSize - lockedWhite.length;

            if (blackNeeded < 0 || whiteNeeded < 0 || blackNeeded + whiteNeeded !== unlockedPlayers.length) {
                alert('팀 구성이 불가능합니다. 고정된 선수를 확인해주세요.');
                return;
            }

            // 모든 조합 생성
            const results = [];
            for (const blackCombo of combinations(unlockedPlayers, blackNeeded)) {
                const blackTeam = [...lockedBlack, ...blackCombo];
                const whiteTeam = [...lockedWhite, ...unlockedPlayers.filter(p => !blackCombo.includes(p))];

                const score = calculateBalanceScore(blackTeam, whiteTeam);
                results.push({ blackTeam, whiteTeam, score });
            }

            // 점수순 정렬 (낮을수록 좋음)
            results.sort((a, b) => a.score - b.score);

            // 상위 3개 표시
            displayResults(results.slice(0, 3));
        }

        // 밸런스 점수 계산
        function calculateBalanceScore(blackTeam, whiteTeam) {
            const blackCategories = {
                attack: 0, midfield: 0, defense: 0, physical: 0, mental: 0, total: 0
            };
            const whiteCategories = {
                attack: 0, midfield: 0, defense: 0, physical: 0, mental: 0, total: 0
            };

            blackTeam.forEach(player => {
                const cats = calculateCategories(player);
                Object.keys(cats).forEach(key => blackCategories[key] += cats[key]);
                blackCategories.total += calculateTotal(player);
            });

            whiteTeam.forEach(player => {
                const cats = calculateCategories(player);
                Object.keys(cats).forEach(key => whiteCategories[key] += cats[key]);
                whiteCategories.total += calculateTotal(player);
            });

            const totalDiff = Math.abs(blackCategories.total - whiteCategories.total);
            const categoryDiffs = ['attack', 'midfield', 'defense', 'physical', 'mental']
                .map(key => Math.abs(blackCategories[key] - whiteCategories[key]))
                .reduce((a, b) => a + b, 0);

            return totalDiff + 0.5 * categoryDiffs;
        }

        // 결과 표시
        function displayResults(results) {
            const container = document.getElementById('resultsContainer');

                const card = createResultCard(result, index + 1);

            container.classList.add('show');
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // 결과 카드 생성

            const { blackTeam, whiteTeam, score } = result;

            const blackCategories = {
                attack: 0, midfield: 0, defense: 0, physical: 0, mental: 0
            };

            };

            blackTeam.forEach(player => {
                const cats = calculateCategories(player);
                Object.keys(cats).forEach(key => blackCategories[key] += cats[key]);
            });

            whiteTeam.forEach(player => {
                const cats = calculateCategories(player);
                Object.keys(cats).forEach(key => whiteCategories[key] += cats[key]);
            });

            // 밸런스 퍼센티지 계산 (0-100%, 100%에 가까울수록 균형)
            const maxDiff = 50; // 임의의 최대 차이값
            const balancePercentage = Math.max(0, 100 - (score / maxDiff) * 100);

            let grade = '';
            if (balancePercentage >= 95) grade = '완벽! 🌟';
            else if (balancePercentage >= 85) grade = '매우 좋음 👍';

            else grade = '불균형 ⚠️';

            const card = document.createElement('div');
            card.className = 'result-card';

            const categoryLabels = {
                attack: '공격력',

                        </div>

                    <div class="team-column white-team">
                        <div class="team-title">⚪ 백팀</div>
                        <div class="team-players">
                            ${whiteTeam.map(p => `
                                <div class="team-player">
                                    <div>
                                        <div class="team-player-name">${p.name}</div>
                                        <div class="team-player-type">${p.type}</div>
                                    </div>
                                    <div class="team-player-total" style="display:none">${calculateTotal(p)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="balance-comparison">
                    <div class="comparison-title">카테고리별 비교</div>
                    <div class="comparison-bars">
                        ${Object.keys(categoryLabels).map(key => {
                            const blackVal = blackCategories[key];
                            const whiteVal = whiteCategories[key];
                            const total = blackVal + whiteVal;
                            const blackPercent = (blackVal / total) * 100;
                            const whitePercent = (whiteVal / total) * 100;

                            return `
                                <div class="comparison-row">
                                    <div class="comparison-label">${categoryLabels[key]}</div>
                                    <div class="comparison-bar-container">

            return card;
        }

        // 레이더 차트 생성 (순수 SVG)
        function createRadarChart(player) {
            const svg = document.getElementById('radarChart');
            const categories = calculateCategories(player);
            const maxValue = Math.max(...Object.values(categories));

            const categoryNames = ['공격력', '미드필드', '수비력', '피지컬', '멘탈'];
            const values = Object.values(categories);

            const centerX = 200;
            const centerY = 200;
            const maxRadius = 150;
            const levels = 5;

            let svgContent = '';

            // 배경 동심원
            for (let i = levels; i > 0; i--) {
                const radius = (maxRadius / levels) * i;
                svgContent += `<circle cx="${centerX}" cy="${centerY}" r="${radius}"
                    fill="none" stroke="var(--border-color)" stroke-width="1" opacity="0.3"/>`;
            }

            // 축 그리기
            const angleStep = (Math.PI * 2) / 5;
            for (let i = 0; i < 5; i++) {
                const angle = angleStep * i - Math.PI / 2;
                const x = centerX + Math.cos(angle) * maxRadius;
                const y = centerY + Math.sin(angle) * maxRadius;

                svgContent += `<line x1="${centerX}" y1="${centerY}" x2="${x}" y2="${y}"
                    stroke="var(--border-color)" stroke-width="1" opacity="0.5"/>`;

                // 라벨
                const labelX = centerX + Math.cos(angle) * (maxRadius + 30);
                const labelY = centerY + Math.sin(angle) * (maxRadius + 30);
                svgContent += `<text x="${labelX}" y="${labelY}"
                    fill="var(--text-primary)" font-size="14" text-anchor="middle"
                    dominant-baseline="middle">${categoryNames[i]}</text>`;
            }

            // 데이터 폴리곤
            let points = '';
            for (let i = 0; i < 5; i++) {
                const angle = angleStep * i - Math.PI / 2;
                const value = values[i];
                const radius = (value / maxValue) * maxRadius;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                points += `${x},${y} `;
            }

            svgContent += `<polygon points="${points}"
                fill="var(--accent-primary)" fill-opacity="0.3"
                stroke="var(--accent-primary)" stroke-width="3"/>`;

            // 데이터 포인트
            for (let i = 0; i < 5; i++) {
                const angle = angleStep * i - Math.PI / 2;
                const value = values[i];
                const radius = (value / maxValue) * maxRadius;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                svgContent += `<circle cx="${x}" cy="${y}" r="5"
                    fill="var(--accent-primary)" stroke="var(--bg-dark)" stroke-width="2"/>`;

                // 값 표시 (숨김)
            }

            svg.innerHTML = svgContent;
        }

        // 엑셀 파일 업로드
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                    // 데이터 파싱 및 업데이트
                    const newPlayers = jsonData.map(row => ({
                        name: row['이름'],
                        type: row['유형'],
                        stats: {
                            speed: row['속력'],
                            acceleration: row['가속도'],
                            stamina: row['체력'],
                            shotPower: row['슛파워'],
                            shotAccuracy: row['슛정확도'],
                            finishing: row['골결정력'],
                            passing: row['패스'],
                            defense: row['수비'],
                            physical: row['몸싸움'],
                            positioning: row['위치선정'],
                            mentality: row['정신력'],
                            aggression: row['적극성']
                        }
                    }));

                    // 기존 선수 상태 유지하면서 업데이트
                    PLAYERS = newPlayers;
                    newPlayers.forEach(player => {
                        if (!playerStates[player.name]) {
                            playerStates[player.name] = {
                                selected: true,
                                locked: 'none'
                            };
                        }
                    });

                    renderPlayerGrid();
                    updateTeamSizeButtons();
                    alert('선수 데이터가 업데이트되었습니다!');
                } catch (error) {
                    alert('파일 읽기 오류: ' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);

            // 파일 입력 초기화
            event.target.value = '';
        }

        // 모달 외부 클릭시 닫기
        window.onclick = function(event) {
            const modal = document.getElementById('statsModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // 초기화 실행
        init();
    </script>
</body>
</html>
